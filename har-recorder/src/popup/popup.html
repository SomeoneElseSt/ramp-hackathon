<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>Tama Agent</h1>
      <span id="dot" class="dot idle" title="idle"></span>
    </header>

    <div class="pet-wrap">
      <div class="pet" id="pet">
        <div class="pet-screen"><canvas id="petLcd" width="160" height="128"></canvas></div>
        <div class="pet-nub"><i></i><i></i><i></i></div>
      </div>
      <div class="pet-tag" id="petTag">asleep</div>
    </div>

    <div id="status" class="status">Idle</div>

    <fieldset id="scopeBox">
      <legend>Recording scope</legend>
      <label><input type="radio" name="scope" value="window" checked /> Current window</label>
      <label><input type="radio" name="scope" value="tabs" /> Selected tabs</label>
      <ul id="tabList" class="tablist hidden"></ul>
    </fieldset>

    <div class="row">
      <button id="start" class="primary">● Start</button>
      <button id="stop" disabled>■ Stop</button>
    </div>
    <div class="row">
      <button id="openPanel" class="primary">▤ Dashboard</button>
    </div>

    <div class="row">
      <button id="export">Export ▾</button>
      <button id="clear" class="danger">Clear</button>
    </div>

    <p class="note">
      Debugger-free capture: in-page fetch/XHR/WebSocket/SSE interception, so no
      "being debugged" banner. Events stream to the local daemon on
      <code>ws://localhost:8787</code>. Export produces
      <code>network.har</code>, <code>activity-trace.json</code>, and
      <code>activity-summary.json</code>.
    </p>
    <script type="module" src="popup.js"></script>
    <script type="module" src="pet.js"></script>
  </body>
</html>
