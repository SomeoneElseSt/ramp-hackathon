<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Tama</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="tamagent">
      <div class="pet" id="pet" title="Tama">
        <div class="screen"><canvas id="lcd" width="200" height="160"></canvas></div>
        <div class="nub"><i></i><i></i><i></i></div>
      </div>
      <div class="tag" id="tag">sleeping</div>

      <div class="panel" id="panel">
        <div>
          <h4>Status</h4>
          <div id="statusLine" class="muted" style="margin-top: 6px">Checking…</div>
        </div>
        <div>
          <h4>Active listeners</h4>
          <div id="listenerRows" style="margin-top: 6px"></div>
          <div id="listenerEmpty" class="muted" style="margin-top: 5px">
            None yet — MCP create_listener or browse to discover.
          </div>
        </div>
        <div>
          <h4>Recent events</h4>
          <div id="events" style="margin-top: 6px"><div class="muted">nothing yet</div></div>
        </div>
        <div class="btn-col">
          <button class="act" id="start">Sit on this window</button>
          <button class="act ghost" id="stop" disabled>Pause ambient</button>
        </div>
        <details class="advanced">
          <summary>Advanced capture</summary>
          <div class="btn-col" style="margin-top: 8px">
            <button class="act ghost" id="export">Export</button>
            <button class="act ghost danger" id="clear">Clear buffer</button>
          </div>
        </details>
      </div>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
