<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Tama</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="tamagent">
      <header class="brand">
        <span class="brand-mark">Tama</span>
        <span class="brand-sub">ambient listen</span>
      </header>

      <div class="pet" id="pet" title="Tama — tap for details">
        <div class="screen"><canvas id="lcd" width="200" height="160"></canvas></div>
        <div class="nub"><i></i><i></i><i></i></div>
      </div>
      <div class="tag" id="tag">sleeping</div>

      <div class="panel" id="panel">
        <p id="statusLine" class="status">Checking…</p>

        <section class="block">
          <h4>Listeners</h4>
          <div id="listenerRows"></div>
          <p id="listenerEmpty" class="muted">
            None yet — agents arm them via MCP.
          </p>
        </section>

        <section class="block" id="eventsBlock">
          <h4>Wake feed</h4>
          <div id="events"><p class="muted">Quiet for now</p></div>
        </section>

        <div class="btn-col">
          <button class="act" id="start">Sit on this window</button>
          <button class="act ghost" id="stop" disabled>Pause</button>
          <button class="act ghost" id="openPanel">▤ Dashboard</button>
        </div>

        <details class="advanced">
          <summary>Developer</summary>
          <p class="muted adv-hint">Local buffer only — not the listen path.</p>
          <div class="btn-col">
            <button class="act ghost" id="export">Export HAR</button>
            <button class="act ghost danger" id="clear">Clear buffer</button>
          </div>
        </details>
      </div>
    </div>
    <script type="module" src="popup.js"></script>
    <script type="module" src="sidepanel-open.js"></script>
  </body>
</html>
